name: Build Vue Application

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Download a copy of your repository code
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Set up the specific Node.js environment your project needs
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' # Change to match your local Node.js version
        cache: 'npm'       # Automatically caches dependencies for faster builds

    # 3. Install dependencies cleanly (similar to npm install)
    - name: Install dependencies
      run: npm ci

    # 4. Compiles and minifies your Vue app for production
    - name: Build project
      run: npm run build
